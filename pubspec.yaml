name: sputni
version: 0.1.0+1
description: Cross-platform app for devices to pair and control the environment via camera.
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.3.1
  web_socket_channel: ^2.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  video_player: ^2.9.2
  video_player_media_kit: ^2.0.0
  media_kit_libs_windows_video: ^1.0.11
  path_provider: ^2.1.5
  crypto: ^3.0.6
  cryptography: ^2.7.0
  file_picker: ^8.0.7
  ffmpeg_kit_flutter_new_min_gpl: ^2.1.1
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  image: ^4.2.0
  shared_preferences: ^2.5.3
  http: ^1.2.1
  latlong2: ^0.9.1
  wakelock_plus: ^1.4.0
  zxing2: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/media/
